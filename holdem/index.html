<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>德州扑克 战绩</title>
</head>
<body>
  <h1>德州战绩！</h1>
  <div id="root"></div>


  <script crossorigin src="//unpkg.com/react@16/umd/react.production.min.js"></script>
  <script crossorigin src="//unpkg.com/react-dom@16/umd/react-dom.production.min.js"></script>
  <script crossorigin src="//unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script crossorigin src="//unpkg.com/bizcharts@4/umd/BizCharts.js"></script>

  <script src="chatData.js"></script>
  <script>
  const { Chart, Line, Point, Slider, Area } = window.BizCharts;
  </script>
  <script type="text/babel">
  ReactDOM.render((
    <Chart height={320} autoFit data={chatData}>
      <Slider />
      <Line shape="smooth" position="time*value" color="nickname" />
      <Point position="time*value" color="nickname" />
      <Area position="time*value" color="nickname" />
    </Chart>
  ), document.getElementById("root"));
  </script>

</body>
</html>
